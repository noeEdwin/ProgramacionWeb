<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor Celsius a Fahrenheit</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
</head>
<body>
    <div class="container">
        <h1>Convertidor °C a °F</h1>
        <div class="form-group">
            <label for="celsius">Grados Celsius:</label>
            <input type="text" id="celsius" placeholder="Ingrese temperatura en °C">
        </div>
        <button id="btnConvertir">Convertir</button>
        <div class="form-group">
            <label for="fahrenheit">Grados Fahrenheit:</label>
            <input type="text" id="fahrenheit" readonly placeholder="Resultado en °F">
        </div>
    </div>
    <script src="js/ejercicio10.js"></script>
</body>
</html>
