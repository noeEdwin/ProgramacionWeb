<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11 - KM a Millas</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
</head>
<body>
    <div class="container">
        <h1>Convertidor KM a Millas</h1>
        <div class="form-group">
            <label for="kilometros">Kilómetros:</label>
            <input type="text" id="kilometros" placeholder="Ingrese distancia en KM">
        </div>
        <button id="btnConvertir">Convertir</button>
        <div class="form-group">
            <label for="millas">Millas:</label>
            <input type="text" id="millas" readonly placeholder="Resultado en millas">
        </div>
    </div>
    <script src="js/ejercicio11.js"></script>
</body>
</html>
