<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13 - Validador de edad</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
</head>
<body>
    <div class="container">
        <h1>Validador de edad</h1>
        <div class="form-group">
            <label for="edad">Edad:</label>
            <input type="text" id="edad" placeholder="Ingrese su edad">
        </div>
        <button id="btnValidar">Validar</button>
        <div class="form-group">
            <label for="resultado">Resultado:</label>
            <input type="text" id="resultado" readonly placeholder="Resultado">
        </div>
    </div>
    <script src="js/ejercicio13.js"></script>
</body>
</html>
