<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14 - Ordenamiento de números</title>
    <link rel="stylesheet" href="css/ejercicio14.css">
</head>
<body>
    <div class="container">
        <h1>Ordenamiento de números</h1>
        <div class="form-group">
            <label for="nums">Números (separados por comas):</label>
            <input type="text" id="nums" placeholder="Ingrese los números">
        </div>
        <button id="btnOrdenar">Ordenar</button>
        <div class="form-group">
            <label for="max">Número más grande:</label>
            <input type="text" id="max" readonly placeholder="Número mayor">
            <label for="min">Número más chico:</label>
            <input type="text" id="min" readonly placeholder="Número menor">
            <label for="promedio">Promedio:</label>
            <input type="text" id="promedio" readonly placeholder="Promedio">
        </div>
    </div>
    <script src="js/ejercicio14.js"></script>
</body>
</html>
